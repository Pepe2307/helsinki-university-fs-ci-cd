name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  periodic_health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://helsinki-university-fs-ci-cd.onrender.com/health)
          echo "HTTP Response code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check failed with status $RESPONSE"
            exit 1
          fi

      - name: Notify Discord on Failure
        uses: sarisia/actions-status-discord@v1
        if: ${{ failure() }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: Failure
          title: "🚨 Alert: Production Health Check Failed!"
          description: "The periodic health check for the Pokedex app on Render has failed."
          color: 0xff0000